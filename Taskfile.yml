version: "3"

tasks:
  default:
    cmds:
      - task: list

  list:
    desc: List all tasks in the current project
    cmds:
      - task --list

  ###################################################
  ############## Install Dependencies ###############
  ###################################################

  install:
    desc: Install all dependencies for the project
    cmds:
      - task: install:frontend
      - task: install:backend

  install:frontend:
    desc: Install dependencies for the frontend packages
    cmds:
      - pnpm install

  install:backend:
    desc: Install dependencies for the Rust backend
    cmds:
      - cargo fetch

  ###################################################
  ############## Clean and Build Tasks ##############
  ###################################################

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf node_modules
      - |
        {{if eq OS "windows"}}
        pnpm -r exec -- powershell -NoProfile -Command "if (Test-Path node_modules) { Remove-Item -Recurse -Force node_modules }"
        {{else}}
        pnpm -r exec -- rm -rf node_modules
        {{end}}
      - pnpm store prune
      - cargo clean

  lint:
    desc: Run linters on all crates
    silent: true
    cmds:
      - cargo fmt --all
      - cargo clippy --workspace -- -D warnings
  
  export-contracts:
    desc: Regenerate TypeScript contracts and the frontend SDK package
    cmds:
      - cargo xtask export-contracts

  test:
    desc: Run Rust tests (set RUN_TESTCONTAINERS=1 to include container tests)
    silent: true
    cmds:
      - task: lint
      - task: export-contracts
      - |
        if [ "${RUN_TESTCONTAINERS:-0}" = "1" ]; then
          cargo test --workspace -- --include-ignored
        else
          cargo test --workspace
        fi

  ###################################################
  #################### Run Tasks ####################
  ###################################################

  ###################################################
  #################### Database #####################
  ###################################################

  db:up:
    desc: Start the PostgreSQL container (unless-stopped)
    cmds:
      - task: run:prepare
      - docker compose up -d postgres

  db:down:
    desc: Stop the PostgreSQL container
    cmds:
      - docker compose down

  db:logs:
    desc: Tail PostgreSQL container logs
    cmds:
      - docker compose logs -f postgres

  ###################################################
  ############# Run Development Servers #############
  ###################################################

  run:prepare:
    desc: Ensure the env file exists
    cmds:
      - |
        if [ ! -f .env ]; then
          echo "Creating .env file from .env.example"
          cp .env.example .env
        fi

  run:admin:
    desc: Run the admin panel in development mode
    dir: apps/web/client
    cmds:
      - pnpm dev

  run:web-backend:
    desc: Run the web server backend in development mode
    cmds:
      - task: run:prepare
      - cargo run --bin sonora_web_server
